  <main class="tool-page" id="main-content">
    <div class="container">
      <div class="tool-header animate-fade-up">
        <div class="breadcrumb"><a href="index.html">Text Tools</a><span>/</span> Case Converter</div>
        <h1>Aa Case Converter</h1>
        <p>Convert text between different letter cases instantly.</p>
      </div>

      <div class="panel animate-fade-up-2">
        <div class="form-group">
          <label class="form-label">Input text</label>
          <textarea class="form-textarea" id="inputText" style="min-height:160px;" placeholder="Type or paste text here..."></textarea>
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
          <button class="btn btn-ghost case-btn" data-case="upper">UPPER CASE</button>
          <button class="btn btn-ghost case-btn" data-case="lower">lower case</button>
          <button class="btn btn-ghost case-btn" data-case="title">Title Case</button>
          <button class="btn btn-ghost case-btn" data-case="sentence">Sentence case</button>
          <button class="btn btn-ghost case-btn" data-case="camel">camelCase</button>
          <button class="btn btn-ghost case-btn" data-case="pascal">PascalCase</button>
          <button class="btn btn-ghost case-btn" data-case="snake">snake_case</button>
          <button class="btn btn-ghost case-btn" data-case="kebab">kebab-case</button>
          <button class="btn btn-ghost case-btn" data-case="constant">CONSTANT_CASE</button>
          <button class="btn btn-ghost case-btn" data-case="dot">dot.case</button>
          <button class="btn btn-ghost case-btn" data-case="alternating">aLtErNaTiNg</button>
          <button class="btn btn-ghost case-btn" data-case="inverse">iNVERSE cASE</button>
        </div>

        <div class="form-group">
          <label class="form-label">Output</label>
          <div style="position:relative;">
            <textarea class="form-textarea" id="outputText" style="min-height:160px;" readonly placeholder="Output will appear here..."></textarea>
            <button class="btn btn-secondary" id="copyBtn" style="position:absolute;top:10px;right:10px;padding:6px 12px;font-size:0.78rem;">Copy</button>
          </div>
        </div>

        <div id="activeCase" class="text-xs text-muted text-mono"></div>
      </div>
    </div>
