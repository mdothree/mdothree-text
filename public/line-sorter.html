  <main class="tool-page" id="main-content">
    <div class="container">
      <div class="tool-header animate-fade-up">
        <div class="breadcrumb"><a href="index.html">Text Tools</a><span>/</span> Line Tools</div>
        <h1>↕️ Line Tools</h1>
        <p>Sort, deduplicate, shuffle, number, trim, and transform lines.</p>
      </div>

      <div class="tool-layout-left" class="animate-fade-up-2">
        <div>
          <div class="panel">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
              <div class="panel-title" style="border:none;margin:0;padding:0;">Input</div>
              <span class="text-xs text-muted text-mono" id="lineInfo">0 lines</span>
            </div>
            <textarea class="form-textarea" id="inputText" style="min-height:300px;" placeholder="Paste lines of text here..."></textarea>
          </div>
          <div class="panel mt-16" id="outputPanel" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
              <div class="panel-title" style="border:none;margin:0;padding:0;">Output</div>
              <div class="btn-group">
                <button class="btn btn-ghost" id="copyOutputBtn" style="padding:6px 12px;font-size:0.78rem;">Copy</button>
                <button class="btn btn-secondary" id="useAsInputBtn" style="padding:6px 12px;font-size:0.78rem;">Use as input</button>
              </div>
            </div>
            <textarea class="form-textarea" id="outputText" style="min-height:200px;" readonly></textarea>
            <div class="text-xs text-muted text-mono mt-8" id="outputInfo"></div>
          </div>
        </div>

        <div>
          <div class="panel">
            <div class="panel-title">Operations</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <button class="btn btn-ghost w-full" data-op="sort-az">↑ Sort A→Z</button>
              <button class="btn btn-ghost w-full" data-op="sort-za">↓ Sort Z→A</button>
              <button class="btn btn-ghost w-full" data-op="sort-length-asc">↑ Sort by length (short)</button>
              <button class="btn btn-ghost w-full" data-op="sort-length-desc">↓ Sort by length (long)</button>
              <button class="btn btn-ghost w-full" data-op="reverse">↕ Reverse order</button>
              <button class="btn btn-ghost w-full" data-op="shuffle">🔀 Shuffle randomly</button>
              <button class="btn btn-ghost w-full" data-op="dedup">🧹 Remove duplicates</button>
              <button class="btn btn-ghost w-full" data-op="dedup-ci">🧹 Remove dupes (ignore case)</button>
              <button class="btn btn-ghost w-full" data-op="trim">✂️ Trim whitespace</button>
              <button class="btn btn-ghost w-full" data-op="remove-empty">🚫 Remove empty lines</button>
              <button class="btn btn-ghost w-full" data-op="number">🔢 Add line numbers</button>
              <button class="btn btn-ghost w-full" data-op="remove-numbers">✕ Remove line numbers</button>
              <button class="btn btn-ghost w-full" data-op="upper">UPPER CASE each line</button>
              <button class="btn btn-ghost w-full" data-op="lower">lower case each line</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
